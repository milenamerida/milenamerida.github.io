<!DOCTYPE html>
<html>

<head>
    <title>Storm Analyzer</title>
    <link rel="stylesheet" href="../static/styles.css">
</head>

<body>
    <h1>Storm Analyzer</h1>

    {% if records %}
    <table>
        <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Km/h</th>
            <th>Mph</th>
            <th>Category</th>
        </tr>

        {% for record in records %}

        <tr class="{{ record.category }}">
            <td>{{ record.date }}</td>
            <td>{{ record.name }}</td>
            <td>{{ record.kmh }}</td>
            <td>{{ "%.1f"|format(record.mph) }}</td>
            <td>{{ record.category }}</td>
        </tr>

        {% endfor %}
    </table>
    {% endif %}
    <br>

    <a href="/">Back to Home</a>
</body>

</html>
